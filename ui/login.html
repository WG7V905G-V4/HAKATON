<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in</title>
  <link rel="stylesheet" href="account-setup-style.css" />
  <link rel="stylesheet" href="https://pyscript.net/latest/pyscript.css" />
  <script defer src="https://pyscript.net/latest/pyscript.js"></script>
</head>
<body>

  <div class="page-bg" style="--page-bg: url('img/login_back.jpg');"></div>

  <div class="page-center">
    <div class="glass-card signup-card anim">

      <div class="signup-heading anim anim-d1">
        <h1>Log in</h1>
        <div class="signup-toggle" onclick="window.location.href='signup.html'">or sign up</div>
      </div>

      <div id="flash" class="flash"></div>

      <div class="signup-fields anim anim-d2">

        <div class="field-group">
          <label class="field-label" for="inp-username">Username</label>
          <input class="field-input" id="inp-username" type="text"
                 placeholder="unique_username" autocomplete="off" />
        </div>

        <div class="field-group">
          <label class="field-label" for="inp-password">Password</label>
          <input class="field-input" id="inp-password" type="password"
                 placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" autocomplete="off" />
        </div>

      </div>

      <div class="signup-footer anim anim-d3">
        <button class="btn btn-primary" id="login-btn">continue</button>
      </div>

    </div>
  </div>

  <py-script src="login.py"></py-script>
</body>
</html>
