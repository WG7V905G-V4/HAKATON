<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Log in</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-map-img">

  <div class="page-center">
    <div class="event-card selected">
      <div class="event-main">
        <h1 class="panel-title">Log in</h1>
        <p class="panel-text">or <a href="signup.html" class="panel-link">sign up</a></p>
      </div>
      <div class="event-expandable" style="max-height:none; opacity:1; padding-bottom:16px;">
        <div class="input-group">
          <span class="event-author">login</span>
          <input type="text" class="search-input" placeholder="@username"/>
        </div>
        <div class="input-group">
          <span class="event-author">password</span>
          <input type="password" class="search-input" placeholder="••••••••"/>
        </div>
      </div>
    </div>
    <div class="page-actions">
      <a href="index.html"><div class="btn-join">log in</div></a>
    </div>
  </div>

</body>
</html>
