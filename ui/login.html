<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="style.css">  <!-- ← добавь это -->
</head>
<body>
<section id="login-section" class="login-section">
  <div class="bg-overlay"></div>

  <div class="content-wrapper">
    <!-- Login Card -->
    <div class="login-card">
      <h1 class="login-title">Log in</h1>
      <p class="login-subtitle">or sing in</p>

      <!-- Input Group: Name -->
      <div class="input-group">
        <label class="input-label">name</label>
        <input type="text" class="input-field" aria-label="name" />
      </div>

      <!-- Input Group: Password -->
      <div class="input-group">
        <label class="input-label">name</label>
        <input type="password" class="input-field" aria-label="password" />
      </div>
    </div>

    <!-- Login Button -->
    <button class="login-btn">
      <span class="btn-text">log in</span>
    </button>
  </div>
</section>

</body>
</html>
