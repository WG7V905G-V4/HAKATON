<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile</title>
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="stylesheet" href="https://pyscript.net/latest/pyscript.css" />
  <script defer src="https://pyscript.net/latest/pyscript.js"></script>
</head>
<body>

  <div class="page-bg" style="--page-bg: url('/static/img/login_back.jpg');"></div>

  <div class="page-center">
    <div class="glass-card profile-card anim">

      <div class="profile-avatar anim anim-d1" id="avatar">?</div>
      <div class="profile-name anim anim-d2"   id="p-name">—</div>
      <div class="profile-meta anim anim-d2"   id="p-meta">—</div>

      <div class="divider anim anim-d3"></div>

      <div class="profile-hobbies anim anim-d3" id="p-hobbies"></div>
      <div class="profile-answers anim anim-d4" id="p-answers"></div>

      <div class="divider anim anim-d4"></div>

      <div class="bottom-btns">
        <button class="btn btn-ghost anim anim-d5" id="logout-btn">log out</button>
        <a href="/main.html">
          <button class="btn btn-ghost anim anim-d5">main</button>
        </a>
      </div>

    </div>
  </div>

  <py-script src="/static/dashboard.py"></py-script>
</body>
</html>
