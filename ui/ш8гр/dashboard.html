<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile</title>
  <link rel="stylesheet" href="account-setup-style.css" />
  <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
</head>
<body>

  <div class="page-bg" style="--page-bg: url('img/login_back.jpg');"></div>

  <div class="page-center">
    <div class="glass-card profile-card anim">

      <div class="profile-avatar anim anim-d1" id="p-avatar">?</div>
      <div class="profile-name   anim anim-d2" id="p-name">—</div>
      <div class="profile-meta   anim anim-d2" id="p-meta">—</div>

      <div class="divider anim anim-d3"></div>

      <div class="profile-hobbies anim anim-d3" id="p-hobbies"></div>
      <div class="profile-answers anim anim-d4" id="p-answers"></div>

      <div class="divider anim anim-d4"></div>

      <button class="btn btn-ghost anim anim-d5" id="btn-logout">log out</button>

    </div>
  </div>

  <script type="py" src="dashboard.py" config='{"packages":[]}'></script>

</body>
</html>
