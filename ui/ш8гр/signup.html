<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign up</title>
  <link rel="stylesheet" href="account-setup-style.css" />
  <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
  <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
</head>
<body>

  <div class="page-bg" style="--page-bg: url('img/login_back.jpg');"></div>

  <div class="page-center">
    <div class="glass-card signup-card anim">

      <div class="signup-heading anim anim-d1">
        <h1 id="heading-title">Sign up</h1>
        <div class="signup-toggle" id="toggle-link">or log in</div>
      </div>

      <div id="flash" class="flash"></div>

      <div class="signup-fields anim anim-d2">

        <div class="field-group" id="row-name">
          <label class="field-label" for="inp-name">Name</label>
          <input class="field-input" id="inp-name" type="text"
                 placeholder="Your name" autocomplete="off" />
        </div>

        <div class="field-group">
          <label class="field-label" for="inp-username">Username</label>
          <input class="field-input" id="inp-username" type="text"
                 placeholder="unique_username" autocomplete="off" />
        </div>

        <div class="field-group" id="row-age">
          <label class="field-label" for="inp-age">Age</label>
          <input class="field-input" id="inp-age" type="number"
                 min="1" max="120" placeholder="25" autocomplete="off" />
        </div>

        <div class="field-group">
          <label class="field-label" for="inp-password">Password</label>
          <input class="field-input" id="inp-password" type="password"
                 placeholder="••••••••" autocomplete="off" />
        </div>

      </div>

      <div class="signup-footer anim anim-d3">
        <button class="btn btn-primary" id="btn-continue">continue</button>
      </div>

    </div>
  </div>

  <script type="py" src="signup.py" config='{"packages":[]}'></script>

</body>
</html>
